<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodePet</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei","Inter",sans-serif;
  background: #f5ede0; color: #2c1f14;
  height: 100vh; display: flex; overflow: hidden;
}
/* sidebar */
.sidebar {
  width: 240px; background: #2c1f14; color: #f5ede0;
  display: flex; flex-direction: column; flex-shrink: 0;
}
.sidebar-header {
  padding: 18px 20px; border-bottom: 1px solid #3d2e1e;
  display: flex; align-items: center; gap: 8px;
  font-weight: bold; font-size: 15px;
}
.conv-list { flex: 1; overflow-y: auto; padding: 12px; }
.conv-item {
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  font-size: 13px; color: #a08c78; margin-bottom: 2px;
  display: flex; justify-content: space-between; align-items: center;
}
.conv-item:hover, .conv-item.active { background: #3d2e1e; color: #f5ede0; }
.conv-item .del {
  display: none; font-size: 14px; color: #e8783a; cursor: pointer;
  padding: 0 4px; border-radius: 4px;
}
.conv-item:hover .del { display: block; }
.conv-item .del:hover { background: #5a3a2a; }
.sidebar-footer { padding: 14px 16px; border-top: 1px solid #3d2e1e; }
/* main */
.main { flex: 1; display: flex; flex-direction: column; }
.header {
  padding: 18px 32px; border-bottom: 1px solid #e8d8c4;
  display: flex; justify-content: space-between; align-items: center;
}
.header h2 { font-size: 19px; }
.btn {
  padding: 7px 14px; border: none; border-radius: 6px;
  cursor: pointer; font-size: 12px; font-weight: bold; font-family: inherit;
}
.btn-primary { background: #e8783a; color: white; }
.btn-primary:hover { background: #d06a2e; }
.btn-secondary { background: #ede0d0; color: #2c1f14; }
.btn-secondary:hover { background: #e0d0bc; }
.messages { flex: 1; overflow-y: auto; padding: 20px 32px; }
.msg { margin-bottom: 14px; }
.msg-header { font-size: 12px; color: #a08c78; margin-bottom: 4px; }
.msg-bubble {
  padding: 10px 14px; border-radius: 10px;
  font-size: 14px; line-height: 1.7; white-space: pre-wrap;
}
.msg.user { display: flex; flex-direction: column; align-items: flex-end; }
.msg.user .msg-bubble { background: #e8d8c4; max-width: 80%; }
.msg.assistant .msg-bubble { background: white; border: 1px solid #e8d8c4; max-width: 90%; }
.msg.status .msg-bubble {
  background: transparent; color: #a08c78;
  font-size: 12px; font-style: italic; padding: 2px 14px;
}
/* input */
.input-area {
  padding: 14px 32px 20px; border-top: 1px solid #e8d8c4;
  display: flex; gap: 10px;
}
.input-area textarea {
  flex: 1; padding: 10px 14px; border: 1px solid #e8d8c4;
  border-radius: 8px; font-size: 14px; font-family: inherit;
  resize: none; outline: none; background: white;
}
.input-area textarea:focus { border-color: #e8783a; }
.send-btn {
  width: 44px; height: 44px; border: none; border-radius: 8px;
  background: #e8783a; color: white; font-size: 18px;
  cursor: pointer; flex-shrink: 0;
}
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* overlay */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 100;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: #f5ede0; border-radius: 12px;
  width: 520px; max-height: 80vh; display: flex;
  flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid #e8d8c4;
  display: flex; justify-content: space-between; align-items: center;
}
.modal-header h3 { font-size: 16px; }
.modal-close {
  background: none; border: none; font-size: 20px;
  cursor: pointer; color: #7a6050; padding: 4px;
}
.modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
.tabs { display: flex; gap: 0; border-bottom: 1px solid #e8d8c4; margin-bottom: 16px; }
.tab {
  padding: 8px 20px; cursor: pointer; font-size: 13px;
  color: #a08c78; border-bottom: 2px solid transparent;
}
.tab.active { color: #e8783a; border-bottom-color: #e8783a; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.modal-body textarea {
  width: 100%; padding: 10px; border: 1px solid #e8d8c4;
  border-radius: 8px; font-size: 13px; font-family: inherit;
  resize: vertical; outline: none; min-height: 200px;
}
.modal-body textarea:focus { border-color: #e8783a; }
.avatar-row { display: flex; gap: 16px; align-items: flex-start; }
.avatar-preview {
  width: 120px; height: 120px; border-radius: 10px;
  background: #ede0d0; display: flex; align-items: center;
  justify-content: center; font-size: 12px; color: #a08c78;
  overflow: hidden; flex-shrink: 0;
}
.avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
.modal-footer {
  padding: 12px 20px; border-top: 1px solid #e8d8c4;
  display: flex; justify-content: flex-end; gap: 8px;
}
.hidden { display: none; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <svg width="22" height="22" viewBox="0 0 22 22">
      <rect x="3" y="7" width="16" height="12" rx="2" fill="none" stroke="#e8783a" stroke-width="2"/>
      <circle cx="11" cy="13" r="2" fill="#e8783a"/>
    </svg>
    CodePet
  </div>
  <div class="conv-list" id="convList"></div>
  <div class="sidebar-footer">
    <button class="btn btn-primary" onclick="newSession()" style="width:100%">+ 新对话</button>
  </div>
</div>

<div class="main">
  <div class="header">
    <h2 id="convTitle">对话</h2>
    <div>
      <button class="btn btn-secondary" onclick="loadConvs()">刷新</button>
      <button class="btn btn-secondary" onclick="openSettings()">设置</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="input" rows="2" placeholder="输入消息…" onkeydown="onInputKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">→</button>
  </div>
</div>

<!-- 设置弹窗 -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3>设置</h3>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="tabs">
        <div class="tab active" onclick="switchTab(this,'tabSoul')">灵魂</div>
        <div class="tab" onclick="switchTab(this,'tabAvatar')">头像</div>
        <div class="tab" onclick="switchTab(this,'tabTts')">语音</div>
      </div>
      <div class="tab-content active" id="tabSoul">
        <p style="font-size:12px;color:#a08c78;margin-bottom:8px">人格设定。留空=默认性格，修改后重启对话生效。</p>
        <textarea id="soulInput"></textarea>
      </div>
      <div class="tab-content" id="tabAvatar">
        <div class="avatar-row">
          <div class="avatar-preview" id="avatarPreview">未选择</div>
          <div>
            <button class="btn btn-secondary" onclick="pickAvatar()">选择图片</button>
            <button class="btn btn-secondary" onclick="clearAvatar()" style="margin-left:8px">清除</button>
            <p style="font-size:12px;color:#a08c78;margin-top:8px">支持 .png / .jpg</p>
          </div>
        </div>
      </div>
      <div class="tab-content" id="tabTts">
        <p style="font-size:12px;color:#a08c78">语音合成功能开发中…</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary" onclick="saveSoul()">保存灵魂</button>
    </div>
  </div>
</div>

<script>
let convs = [], processing = false;

function appendMsg(role, content) {
  const el = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  const m = {user:'你',assistant:'CodePet',tool:'',status:''};
  const l = m[role]||'';
  d.innerHTML = l ? '<div class="msg-header">'+l+'</div><div class="msg-bubble">'+esc(content)+'</div>' : '<div class="msg-bubble">'+esc(content)+'</div>';
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function setBusy(b) {
  processing = b;
  document.getElementById('sendBtn').disabled = b;
  document.getElementById('input').disabled = b;
  if (!b) document.getElementById('input').focus();
}
function onInputKey(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); send(); } }

async function send() {
  if (processing) return;
  const inp = document.getElementById('input');
  const text = inp.value.trim(); if (!text) return;
  inp.value = ''; setBusy(true);
  appendMsg('user', text); appendMsg('status', '思考中…');
  try {
    const reply = await pywebview.api.send(text);
    const m = document.getElementById('messages');
    m.removeChild(m.lastChild);
    appendMsg('assistant', reply||'（无回复）');
  } catch(e) {
    const m = document.getElementById('messages');
    if (m.lastChild) m.removeChild(m.lastChild);
    appendMsg('status', '出错了：'+e);
  } finally { setBusy(false); }
}

async function loadConvs() {
  const data = await pywebview.api.get_convs();
  convs = JSON.parse(data);
  const el = document.getElementById('convList'); el.innerHTML = '';
  convs.forEach((c,i) => {
    const d = document.createElement('div');
    d.className = 'conv-item'+(i===0?' active':'');
    d.innerHTML = '<span>'+esc(c.name)+'</span><span class="del" onclick="event.stopPropagation();deleteConv('+c.id+')">✕</span>';
    d.onclick = () => switchConv(c.id);
    el.appendChild(d);
  });
  if (convs.length>0) document.getElementById('convTitle').textContent = convs[0].name;
}
async function switchConv(id) {
  await pywebview.api.switch_conv(id);
  document.querySelectorAll('.conv-item').forEach(e=>e.classList.remove('active'));
  const data = await pywebview.api.get_convs();
  convs = JSON.parse(data);
  const hit = convs.find(c=>c.id===id);
  if (hit) document.getElementById('convTitle').textContent = hit.name;
  document.querySelectorAll('.conv-item').forEach(e=>{
    if (e.textContent===(hit?hit.name:'')) e.classList.add('active');
  });
  document.getElementById('messages').innerHTML = '';
  const msgs = await pywebview.api.get_history();
  JSON.parse(msgs).forEach(m=>{ if(m.role!=='system') appendMsg(m.role,m.content||'(工具调用)'); });
}
async function newSession() {
  await pywebview.api.new_conv();
  document.getElementById('messages').innerHTML = '';
  document.getElementById('convTitle').textContent = '新对话';
  loadConvs();
}
async function deleteConv(id) {
  if (!confirm('确定删除该对话？')) return;
  await pywebview.api.delete_conv(id);
  document.getElementById('messages').innerHTML = '';
  loadConvs();
}

// 设置
async function openSettings() {
  document.getElementById('settingsOverlay').classList.add('open');
  const soul = await pywebview.api.get_soul();
  document.getElementById('soulInput').value = soul;
  const av = await pywebview.api.get_avatar();
  updateAvatarPreview(av);
}
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
function switchTab(el, id) {
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}
async function saveSoul() {
  const text = document.getElementById('soulInput').value.trim();
  await pywebview.api.save_soul(text);
  closeSettings();
}
async function pickAvatar() {
  const path = await pywebview.api.pick_avatar();
  if (path) updateAvatarPreview(path);
}
async function clearAvatar() {
  await pywebview.api.clear_avatar();
  updateAvatarPreview('');
}
function updateAvatarPreview(path) {
  const el = document.getElementById('avatarPreview');
  if (path) { el.innerHTML = '<img src="file:///'+path.replace(/\\/g,'/')+'" onerror="this.parentElement.innerHTML=\'无法加载\'">'; }
  else { el.innerHTML = '未选择'; }
}

window.addEventListener('pywebviewready', async () => {
  await loadConvs();
  if (convs.length > 0) await switchConv(convs[0].id);
});
</script>
</body>
</html>
