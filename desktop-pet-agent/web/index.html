<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodePet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","Inter",sans-serif;background:#f5ede0;color:#2c1f14;height:100vh;display:flex;overflow:hidden}
.sidebar{width:240px;background:#2c1f14;color:#f5ede0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:18px 20px;border-bottom:1px solid #3d2e1e;display:flex;align-items:center;gap:8px;font-weight:bold;font-size:15px}
.nav{flex:1;padding:12px;display:flex;flex-direction:column;gap:2px}
.nav-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#a08c78;display:flex;align-items:center;gap:10px;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover,.nav-item.active{background:#3d2e1e;color:#f5ede0;font-weight:bold}
.nav-item .icon{width:18px;height:18px;flex-shrink:0}
.nav-conv-list{margin-left:28px;margin-top:4px}
.nav-conv-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:#7a6050;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;justify-content:space-between;align-items:center}
.nav-conv-item:hover,.nav-conv-item.active{background:#3d2e1e;color:#f5ede0}
.nav-conv-item .del{display:none;font-size:12px;color:#e8783a;cursor:pointer;padding:0 4px}
.nav-conv-item:hover .del{display:block}
.nav-conv-item .del:hover{background:#5a3a2a;border-radius:3px}
.sidebar-footer{padding:14px 16px;border-top:1px solid #3d2e1e;font-size:11px;color:#7a6050}
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* 宠物面板 */
.pet-panel{
  width:180px;background:#f5ede0;border-left:1px solid #e8d8c4;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;flex-shrink:0;position:relative;min-width:80px;max-width:400px;
  transition:width 0.2s;
}
.pet-canvas{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;width:100%}
.pet-canvas svg{width:100%;height:auto;max-height:100%}
.pet-controls{display:flex;gap:8px;align-items:center;padding-top:12px;flex-shrink:0}
.pet-controls button{
  width:28px;height:28px;border:1px solid #e8d8c4;border-radius:6px;
  background:white;cursor:pointer;font-size:16px;display:flex;
  align-items:center;justify-content:center;color:#2c1f14
}
.pet-controls button:hover{background:#ede0d0}
.pet-controls .size-label{font-size:11px;color:#a08c78;min-width:32px;text-align:center}
.main{flex:1;display:flex;flex-direction:column}
.header{padding:18px 32px;border-bottom:1px solid #e8d8c4;display:flex;justify-content:space-between;align-items:center}
.header h2{font-size:19px}
.page{display:none;flex-direction:column;flex:1;min-height:0}
.page.active{display:flex}
.btn{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:bold;font-family:inherit}
.btn-primary{background:#e8783a;color:white}
.btn-primary:hover{background:#d06a2e}
.btn-secondary{background:#ede0d0;color:#2c1f14}
.btn-secondary:hover{background:#e0d0bc}
.messages{flex:1;overflow-y:auto;padding:20px 32px;min-height:0}
.msg{margin-bottom:14px}
.msg-header{font-size:12px;color:#a08c78;margin-bottom:4px}
.msg-bubble{padding:10px 14px;border-radius:10px;font-size:14px;line-height:1.7;white-space:pre-wrap;user-select:text;position:relative}
.msg-bubble .copy-btn{display:none;position:absolute;top:4px;right:4px;padding:2px 6px;border:none;border-radius:4px;background:#ede0d0;cursor:pointer;font-size:10px;color:#7a6050}
.msg:hover .copy-btn{display:block}
.msg.user{display:flex;flex-direction:column;align-items:flex-end}
.msg.user .msg-bubble{background:#e8d8c4;max-width:80%}
.msg.assistant .msg-bubble{background:white;border:1px solid #e8d8c4;max-width:90%}
.msg.msg-status .msg-bubble{background:transparent;color:#a08c78;font-size:12px;font-style:italic;padding:2px 14px}
.input-area{padding:14px 32px 20px;border-top:1px solid #e8d8c4;display:flex;gap:10px}
.input-area textarea{flex:1;padding:10px 14px;border:1px solid #e8d8c4;border-radius:8px;font-size:14px;font-family:inherit;resize:none;outline:none;background:white}
.input-area textarea:focus{border-color:#e8783a}
.send-btn{width:44px;height:44px;border:none;border-radius:8px;background:#e8783a;color:white;font-size:18px;cursor:pointer;flex-shrink:0}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}

/* 模式切换栏 */
.mode-bar{display:flex;align-items:center;gap:7px;padding:6px 32px 10px;cursor:pointer;font-size:12px;color:#a08c78;user-select:none;border-top:1px solid #e8d8c4;background:#faf6f0;transition:color 0.15s}
.mode-bar:hover{color:#2c1f14}
.mode-dot{width:8px;height:8px;border-radius:50%;transition:background 0.2s}
.mode-bar.plan .mode-dot{background:#a08c78}
.mode-bar.build .mode-dot{background:#4caf50}

.settings-body{flex:1;overflow-y:auto;padding:24px 32px;min-height:0}
.settings-tabs{display:flex;gap:0;border-bottom:1px solid #e8d8c4;margin-bottom:20px}
.settings-tab{padding:8px 20px;cursor:pointer;font-size:13px;color:#a08c78;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.settings-tab.active{color:#e8783a;border-bottom-color:#e8783a}
.settings-content{display:none}
.settings-content.active{display:block}
.settings-body textarea{width:100%;padding:10px;border:1px solid #e8d8c4;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;outline:none;min-height:220px}
.settings-body textarea:focus{border-color:#e8783a}
.avatar-row{display:flex;gap:16px;align-items:flex-start}
.avatar-preview{width:120px;height:120px;border-radius:10px;background:#ede0d0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#a08c78;overflow:hidden;flex-shrink:0}
.avatar-preview img{width:100%;height:100%;object-fit:cover}

/* MCP 页面 */
.mcp-card{border:1px solid #e8d8c4;border-radius:10px;padding:16px;margin-bottom:12px;background:white}
.mcp-card-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.mcp-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.mcp-status-dot.ok{background:#4caf50}
.mcp-status-dot.err{background:#e8783a}
.mcp-card-name{font-weight:bold;font-size:14px;flex:1}
.mcp-card-actions{display:flex;gap:6px}
.mcp-card-cmd{font-size:11px;color:#a08c78;margin-bottom:8px;font-family:monospace}
.mcp-card-tools{display:flex;flex-wrap:wrap;gap:4px}
.mcp-tool-tag{font-size:11px;padding:2px 8px;background:#f0e8d8;border-radius:4px;color:#5a4030}
.mcp-add-card{border:2px dashed #d0c0a8;border-radius:10px;padding:20px;text-align:center;cursor:pointer;color:#a08c78;background:transparent;transition:all 0.2s}
.mcp-add-card:hover{border-color:#e8783a;color:#e8783a;background:#faf0e4}

/* Token 栏 */
#pageChat{position:relative}
.token-bar{position:absolute;bottom:10px;right:32px;font-size:11px;color:#a08c78;background:#faf6f0;padding:3px 10px;border-radius:6px;border:1px solid #e8d8c4;line-height:1.5}

/* 技能页面 */
.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;padding:4px 0}
.skill-card{border:1px solid #e8d8c4;border-radius:12px;padding:18px;background:white;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;position:relative}
.skill-card:hover{border-color:#d0b898;box-shadow:0 3px 12px rgba(44,31,20,0.06)}
.skill-card-name{font-weight:bold;font-size:15px;color:#2c1f14;margin-bottom:3px}
.skill-card:hover .skill-card-del{display:block}
.skill-card-del{display:none;position:absolute;top:6px;right:10px;font-size:18px;color:#c0a898;cursor:pointer;line-height:1;padding:0 4px;border-radius:4px;background:rgba(255,255,255,0.8)}
.skill-card-del:hover{color:#e8783a;background:#f0e8dc}
.skill-card-add{border:2px dashed #d0c0a8;cursor:pointer;min-height:140px;justify-content:center}
.char-card-img{width:100%;height:100px;object-fit:contain;border-radius:8px;margin-bottom:6px;background:#f5ede0}
.char-card-active{position:absolute;top:8px;right:8px;font-size:14px;color:#e8783a}
.char-mood-box{text-align:center;padding:8px;border:1px solid #e8d8c4;border-radius:8px;background:#faf6f0}
.char-mood-box img{width:80px;height:80px;object-fit:contain;display:block;margin:0 auto 4px}
.char-mood-box .mood-label{font-size:11px;color:#a08c78}
.char-mood-upload{font-size:11px;color:#e8783a;cursor:pointer;margin-top:4px;display:inline-block}
.char-mood-upload:hover{text-decoration:underline}
.skill-card-add:hover{border-color:#e8783a;background:#faf6f0}
.skill-card-add:hover span{color:#e8783a}
.skill-card-desc{font-size:12px;color:#a08c78;margin-bottom:10px;min-height:1.2em}
.skill-card-preview{font-size:12px;color:#7a6050;line-height:1.6;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
.skill-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid #f0e8dc}
.skill-card-status{font-size:11px;color:#a08c78}
/* Toggle switch */
.switch{position:relative;display:inline-block;width:36px;height:20px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;border-radius:20px;background:#d0c0a8;transition:0.25s}
.switch .slider::before{content:"";position:absolute;height:16px;width:16px;left:2px;bottom:2px;border-radius:50%;background:white;transition:0.25s}
.switch input:checked+.slider{background:#e8783a}
.switch input:checked+.slider::before{transform:translateX(16px)}
/* 详情弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(44,31,20,0.35);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:white;border-radius:14px;width:640px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.15)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid #e8d8c4}
.modal-header h3{font-size:16px}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#a08c78;padding:0 4px}
.modal-close:hover{color:#2c1f14}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1;font-size:13px;line-height:1.7;white-space:pre-wrap;color:#2c1f14}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <svg width="22" height="22" viewBox="0 0 22 22"><rect x="3" y="7" width="16" height="12" rx="2" fill="none" stroke="#e8783a" stroke-width="2"/><circle cx="11" cy="13" r="2" fill="#e8783a"/></svg>
    CodePet
    <span id="workdirBtn" onclick="pickWorkdir()" style="margin-left:auto;font-size:11px;color:#7a6050;cursor:pointer;padding:2px 6px;border-radius:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px" title="点击更改工作目录">📁</span>
  </div>
  <div class="nav">
    <button class="nav-item active" onclick="switchPage('chat',this)">
      <svg class="icon" viewBox="0 0 18 18" fill="none"><path d="M3 3h12a1 1 0 011 1v8a1 1 0 01-1 1H6l-3 3V4a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/></svg>
      对话
    </button>
    <div class="nav-conv-list" id="navConvList"></div>
    <button class="nav-item" onclick="switchPage('mcp',this)">
      <svg class="icon" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="14" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="6" width="6" height="10" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M5 8v3" stroke="currentColor" stroke-width="1.5"/><path d="M13 10v3" stroke="currentColor" stroke-width="1.5"/></svg>
      MCP
    </button>
    <button class="nav-item" onclick="switchPage('skill',this)">
      <svg class="icon" viewBox="0 0 18 18" fill="none"><path d="M9 1l1.5 4.5L15 7l-4.5 1.5L9 13l-1.5-4.5L3 7l4.5-1.5L9 1z" stroke="currentColor" stroke-width="1.2"/><circle cx="9" cy="9" r="3.5" stroke="currentColor" stroke-width="1.2"/></svg>
      技能
    </button>
    <button class="nav-item" onclick="switchPage('settings',this)">
      <svg class="icon" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M9 1v2M9 15v2M1 9h2M15 9h2M2.5 2.5l1.5 1.5M14 14l1.5 1.5M2.5 15.5l1.5-1.5M14 4l1.5-1.5" stroke="currentColor" stroke-width="1.5"/></svg>
      设置
    </button>
  </div>
  <div class="sidebar-footer">CodePet v0.1.0</div>
</div>

<div class="main">
  <div class="page active" id="pageChat">
    <div class="header">
      <div>
        <h2 id="convTitle" style="display:inline">对话</h2>
      </div>
      <button class="btn btn-secondary" onclick="newSession()">+ 新对话</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="input" rows="2" placeholder="输入消息…" onkeydown="onInputKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="onSendClick()">→</button>
    </div>
    <div class="question-bar" id="questionBar" style="display:none">
      <span style="font-size:12px;color:#2c1f14;font-weight:bold;margin-bottom:4px">❓ Agent 需要确认</span>
      <div style="display:flex;gap:8px">
        <input type="text" id="questionInput" style="flex:1;padding:8px 12px;border:1px solid #e8d8c4;border-radius:6px;font-size:13px;font-family:inherit;outline:none" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitAnswer()}">
        <button class="btn btn-primary" onclick="submitAnswer()" style="font-size:13px">提交</button>
      </div>
    </div>
    <div class="token-bar" id="tokenBar">--</div>
    <div class="mode-bar" id="modeBar" onclick="toggleMode()" title="点击或按 Tab 切换模式">
      <span class="mode-dot" id="modeDot"></span>
      <span id="modeLabel">规划模式</span>
    </div>
  </div>

  <div class="page" id="pageMcp">
    <div class="header"><h2>MCP 服务</h2></div>
    <div class="settings-body">
      <div id="mcpList"></div>
      <div class="mcp-add-card" onclick="showAddMcp()">+ 添加 MCP 服务</div>
    </div>
    <div id="mcpAddForm" style="display:none;padding:0 32px 20px;border-top:1px solid #e8d8c4">
      <div style="display:flex;gap:8px;margin-top:16px;align-items:flex-end">
        <div style="flex:2">
          <label style="font-size:12px;color:#a08c78;display:block;margin-bottom:4px">名称</label>
          <input type="text" id="mcpAddName" style="width:100%;padding:8px;border:1px solid #e8d8c4;border-radius:6px;font-size:13px;font-family:inherit;outline:none">
        </div>
        <div style="flex:3">
          <label style="font-size:12px;color:#a08c78;display:block;margin-bottom:4px">命令</label>
          <input type="text" id="mcpAddCmd" style="width:100%;padding:8px;border:1px solid #e8d8c4;border-radius:6px;font-size:13px;font-family:inherit;outline:none">
        </div>
        <div style="flex:2">
          <label style="font-size:12px;color:#a08c78;display:block;margin-bottom:4px">参数 (JSON 数组)</label>
          <input type="text" id="mcpAddArgs" value='["serve","--mcp"]' style="width:100%;padding:8px;border:1px solid #e8d8c4;border-radius:6px;font-size:13px;font-family:inherit;outline:none">
        </div>
        <button class="btn btn-primary" onclick="doAddMcp()">添加</button>
        <button class="btn btn-secondary" onclick="cancelAddMcp()">取消</button>
      </div>
    </div>
  </div>

  <div class="page" id="pageSkill">
    <div class="header"><h2>技能</h2></div>
    <div class="settings-body">
      <div class="skill-grid" id="skillGrid"></div>
    </div>
  </div>

  <!-- 角色包详情弹窗 -->
  <div class="modal-overlay" id="charModal" onclick="hideCharDetail(event)">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="charModalTitle" style="cursor:pointer" onclick="renameChar(_charModalName)" title="点击重命名">角色包 ✎</h3>
        <div>
          <button class="btn btn-secondary" id="charSetActiveBtn" style="margin-right:8px;font-size:12px">设为展示</button>
          <button class="modal-close" onclick="hideCharDetail()">&times;</button>
        </div>
      </div>
      <div class="modal-body" id="charModalBody" style="white-space:normal">
        <p style="font-size:13px;font-weight:bold;color:#a08c78;margin-bottom:8px">情绪立绘</p>
        <div id="charMoodGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:16px"></div>
        <p style="font-size:13px;font-weight:bold;color:#a08c78;margin-bottom:8px">灵魂设定</p>
        <textarea id="charSoulInput" style="width:100%;padding:10px;border:1px solid #e8d8c4;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;outline:none;min-height:120px"></textarea>
      </div>
      <div style="padding:12px 22px;border-top:1px solid #e8d8c4;text-align:right">
        <button class="btn btn-primary" onclick="saveCharSoul()">保存灵魂设定</button>
      </div>
    </div>
  </div>

  <!-- 技能详情弹窗（查看+编辑） -->
  <div class="modal-overlay" id="skillModal" onclick="hideSkillDetail(event)">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="skillModalTitle">技能详情</h3>
        <div>
          <button class="btn btn-secondary" id="skillEditBtn" onclick="toggleSkillEdit()" style="margin-right:8px;font-size:12px">编辑</button>
          <button class="modal-close" onclick="hideSkillDetail()">&times;</button>
        </div>
      </div>
      <div class="modal-body" id="skillModalBody" style="white-space:pre-wrap"></div>
      <textarea id="skillModalEditor" style="display:none;width:100%;flex:1;padding:18px 22px;border:none;font-size:13px;font-family:monospace;line-height:1.7;resize:none;outline:none;background:#faf6f0"></textarea>
      <div id="skillModalSaveRow" style="display:none;padding:12px 22px;border-top:1px solid #e8d8c4;text-align:right">
        <button class="btn btn-primary" onclick="saveSkillEdit()">保存</button>
      </div>
    </div>
  </div>

  <div class="page" id="pageSettings">
    <div class="header"><h2>设置</h2></div>
    <div class="settings-body">
      <div class="settings-tabs">
        <button class="settings-tab active" onclick="switchSettingTab(this,'stModel')">模型</button>
        <button class="settings-tab" onclick="switchSettingTab(this,'stAvatar')">立绘</button>
        <button class="settings-tab" onclick="switchSettingTab(this,'stTts')">语音</button>
        <button class="settings-tab" onclick="switchSettingTab(this,'stRule')">规则</button>
      </div>
      <div class="settings-content active" id="stModel">
        <p style="font-size:12px;color:#a08c78;margin-bottom:12px">选择 AI 模型和配置 API 密钥。</p>
        <div style="margin-bottom:16px">
          <label style="font-size:13px;font-weight:bold;display:block;margin-bottom:6px">模型</label>
          <select id="modelSelect" style="width:100%;padding:10px;border:1px solid #e8d8c4;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:white">
            <option value="deepseek-v4-flash">deepseek-v4-flash</option>
            <option value="deepseek-v4-pro">deepseek-v4-pro</option>
          </select>
        </div>
        <div style="margin-bottom:16px">
          <label style="font-size:13px;font-weight:bold;display:block;margin-bottom:6px">API Key</label>
          <input type="password" id="apiKeyInput" style="width:100%;padding:10px;border:1px solid #e8d8c4;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:white">
        </div>
        <div style="text-align:right"><button class="btn btn-primary" onclick="saveModel()">保存模型设定</button></div>
      </div>
      <div class="settings-content" id="stAvatar">
        <div id="charGrid" class="skill-grid" style="margin-bottom:12px"></div>
      </div>
      <div class="settings-content" id="stTts">
        <p style="font-size:12px;color:#a08c78">语音合成功能开发中…</p>
      </div>
      <div class="settings-content" id="stRule">
        <p style="font-size:12px;color:#a08c78;margin-bottom:8px">自定义规则（AGENTS.md），加载进上下文后 LLM 会遵循。</p>
        <div id="ruleCreate" style="text-align:center;padding:40px 0">
          <button class="btn btn-primary" onclick="createRules()">创建 AGENTS.md 文件</button>
        </div>
        <div id="ruleEditor" style="display:none">
          <textarea id="rulesInput"></textarea>
          <div style="margin-top:12px;text-align:right"><button class="btn btn-primary" onclick="saveRules()">保存规则</button></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let convs = [], processing = false, statusTimer = null;

// 模式切换
async function loadMode() {
  const mode = await pywebview.api.get_mode();
  applyMode(mode);
}
function applyMode(mode) {
  const bar = document.getElementById('modeBar');
  bar.className = 'mode-bar ' + mode;
  document.getElementById('modeLabel').textContent = mode === 'plan' ? '规划模式' : '构建模式';
}
async function toggleMode() {
  const current = await pywebview.api.get_mode();
  const next = current === 'plan' ? 'build' : 'plan';
  await pywebview.api.set_mode(next);
  applyMode(next);
}

function switchPage(name, btn) {
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('page'+name.charAt(0).toUpperCase()+name.slice(1)).classList.add('active');
  const pet = document.getElementById('petPanel');
  if (name === 'chat') {
    pet.style.display = 'flex';
    setMood('默认');
  } else {
    pet.style.display = 'none';
  }
  if (name === 'settings') loadSettings();
  if (name === 'mcp') loadMcpStatus();
  if (name === 'skill') loadSkills();
}

function appendMsg(role, content) {
  const el = document.getElementById('messages');
  const d = document.createElement('div'); d.className = 'msg '+role;
  const labels = {user:'你',assistant:'CodePet'};
  const l = labels[role]||'';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = content;
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.textContent = '复制';
  btn.onclick = () => copyText(btn, content);
  bubble.appendChild(btn);
  if (l) {
    const h = document.createElement('div'); h.className = 'msg-header'; h.textContent = l;
    d.appendChild(h);
  }
  d.appendChild(bubble);
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = '复制', 2000);
  }).catch(() => { btn.textContent = '失败'; });
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function setBusy(b) {
  processing = b;
  const btn = document.getElementById('sendBtn');
  btn.disabled = false;
  btn.textContent = b ? '⏹' : '→';
  document.getElementById('input').disabled = b;
  if (!b) { document.getElementById('input').focus(); }
}
function onSendClick() {
  if (processing) { pywebview.api.interrupt(); return; }
  send();
}
function onInputKey(e) {
  if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); send(); return; }
  if (e.key==='Tab') { e.preventDefault(); if (document.getElementById('pageChat').classList.contains('active')) toggleMode(); }
}

function updatePetAvatar(src) {
  const img = document.getElementById('petAvatarImg');
  const svg = document.getElementById('petAvatarSvg');
  if (src) {
    img.src = src;
    img.style.display = 'block';
    svg.style.display = 'none';
  } else {
    img.style.display = 'none';
    svg.style.display = 'block';
  }
}

function resizePet(delta) {
  const panel = document.getElementById('petPanel');
  let w = parseInt(panel.style.width) || 180;
  w = Math.max(80, Math.min(400, w + delta));
  panel.style.width = w + 'px';
  document.getElementById('petSizeInput').value = w;
  pywebview.api.save_pet_size(w);
}
function setPetSize(val) {
  let w = parseInt(val) || 180;
  w = Math.max(80, Math.min(400, w));
  document.getElementById('petPanel').style.width = w + 'px';
  document.getElementById('petSizeInput').value = w;
  pywebview.api.save_pet_size(w);
}
function setMood(name) {
  pywebview.api.get_mood_image(name).then(dataUrl => {
    if (dataUrl) {
      document.getElementById('petAvatarSvg').style.display = 'none';
      document.getElementById('petAvatarImg').src = dataUrl;
      document.getElementById('petAvatarImg').style.display = 'block';
    } else {
      document.getElementById('petAvatarImg').style.display = 'none';
      document.getElementById('petAvatarSvg').style.display = 'block';
    }
  });
}
async function pickWorkdir() {
  const path = await pywebview.api.pick_workdir();
  document.getElementById('workdirBtn').textContent = '📁 ' + path.split('\\').pop();
  document.getElementById('workdirBtn').title = path;
  document.getElementById('messages').innerHTML = '';
  await loadConvs();
  if (convs.length > 0) await switchConv(convs[0].id);
  else await newSession();
}

async function renameConv(id) {
  const hit = convs.find(c=>c.id===id);
  const name = prompt('输入新名称:', hit ? hit.name : '');
  if (name) {
    await pywebview.api.rename_conv(id, name);
    loadConvs();
  }
}

function appendStatus(text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg msg-status';
  d.innerHTML = '<div class="msg-bubble" style="color:#a08c78;font-size:12px;font-style:italic;padding:2px 14px">'+esc(text)+'</div>';
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}

let _typingTimer = null;
function animateReply(text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg assistant';
  d.innerHTML = '<div class="msg-header">CodePet</div><div class="msg-bubble"></div>';
  msgs.appendChild(d);
  const bubble = d.querySelector('.msg-bubble');
  let i = 0;
  function tick() {
    if (i < text.length) {
      const n = 2 + Math.floor(Math.random() * 4);
      bubble.textContent += text.slice(i, i + n);
      i += n;
      msgs.scrollTop = msgs.scrollHeight;
      _typingTimer = setTimeout(tick, 18 + Math.random() * 25);
    } else { setBusy(false); _typingTimer = null; }
  }
  tick();
}
function stopTyping() {
  if (_typingTimer) { clearTimeout(_typingTimer); _typingTimer = null; }
  setBusy(false);
}
function showQuestionInput(q) {
  const bar = document.getElementById('questionBar');
  bar.style.display = 'block';
  document.getElementById('questionInput').focus();
}
function submitAnswer() {
  const inp = document.getElementById('questionInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  document.getElementById('questionBar').style.display = 'none';
  pywebview.api.answer_question(text);
}

let _lastConvTokens = 0;

function updateTokenBar(turnTokens) {
  _lastConvTokens += turnTokens;
  const k = (_lastConvTokens / 1000).toFixed(1);
  const pct = (_lastConvTokens / 10000).toFixed(1);
  document.getElementById('tokenBar').textContent = k + 'k (' + pct + '%)';
}

async function pollStatus() {
  const data = await pywebview.api.get_status_updates();
  for (const item of JSON.parse(data)) {
    if (item.startsWith('__USER_ANSWER__:')) {
      appendMsg('user', item.slice(16));
    } else if (item.startsWith('__ASK_USER__:')) {
      const q = item.slice(13);
      const el = document.getElementById('messages');
      const d = document.createElement('div'); d.className = 'msg msg-status';
      d.innerHTML = '<div class="msg-bubble" style="color:#2c1f14;font-size:12px;padding:2px 14px">❓ ' + esc(q) + '</div>';
      el.appendChild(d); el.scrollTop = el.scrollHeight;
      showQuestionInput(q);
    } else if (item.startsWith('__PLAN__:')) {
      const p = JSON.parse(item.slice(9));
      const steps = p.steps.map((s,i) => (s.done ? '✅' : '☐') + ' ' + esc(s.text)).join('<br>');
      const msgs = document.getElementById('messages');
      const d = document.createElement('div'); d.className = 'msg msg-status';
      d.innerHTML = '<div class="msg-bubble" style="color:#2c1f14;font-size:12px;padding:2px 14px">📋 ' + esc(p.title) + '<br>' + steps + '</div>';
      msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
    } else if (item.startsWith('__TOKEN__:')) {
      const tu = JSON.parse(item.slice(10));
      updateTokenBar(tu.prompt + tu.completion);
    } else if (item.startsWith('__TEXT__:')) {
      appendMsg('assistant', item.slice(9));
    } else {
      appendStatus(item);
      if (item.includes('思考')) setMood('思考');
    }
  }
}

async function pollReply() {
  const reply = await pywebview.api.check_reply();
  if (!reply) return;
  if (reply.startsWith('__ERROR__:')) {
    appendStatus('出错了：'+reply.slice(10));
    setBusy(false);
    clearInterval(statusTimer);
    return;
  }
  if (reply === '__INTERRUPTED__') {
    stopTyping();
    clearInterval(statusTimer);
    appendStatus('已中断');
    return;
  }
  const mood = await pywebview.api.check_mood();
  if (mood) setMood(mood);
  animateReply(reply);
  clearInterval(statusTimer);
}

async function send() {
  if (processing) return;
  const inp = document.getElementById('input');
  const text = inp.value.trim(); if (!text) return;
  inp.value = ''; setBusy(true);
  appendMsg('user', text);
  pywebview.api.start_stream(text);
  statusTimer = setInterval(() => {
    if (!processing) { clearInterval(statusTimer); return; }
    pollStatus();
    pollReply();
  }, 150);
}

// ---- 会话侧栏 ----
async function loadConvs() {
  const data = await pywebview.api.get_convs();
  convs = JSON.parse(data);
  const el = document.getElementById('navConvList'); el.innerHTML = '';
  convs.forEach((c,i) => {
    const d = document.createElement('div');
    d.className = 'nav-conv-item'+(i===0?' active':'');
    d.innerHTML = '<span>'+esc(c.name)+'</span><span class="del" onclick="event.stopPropagation();deleteConv('+c.id+')">✕</span>';
    d.title = '双击重命名';
    d.ondblclick = () => renameConv(c.id);
    d.onclick = () => switchConv(c.id);
    el.appendChild(d);
  });
}
async function switchConv(id) {
  if (processing) return;
  await pywebview.api.switch_conv(id);
  document.querySelectorAll('.nav-conv-item').forEach(e=>e.classList.remove('active'));
  const hit = convs.find(c=>c.id===id);
  if (hit) document.getElementById('convTitle').textContent = hit.name;
  document.querySelectorAll('.nav-conv-item').forEach(e=>{ if(e.textContent.includes(hit?hit.name:'')) e.classList.add('active'); });
  document.getElementById('messages').innerHTML = '';
  _lastConvTokens = await pywebview.api.get_conv_total_tokens(id);
  updateTokenBar(0);
  const msgs = await pywebview.api.get_history();
  for (const m of JSON.parse(msgs)) {
    if (m.role === 'system' || m.role === 'tool') continue;
    if (m.role === 'user') { appendMsg('user', m.content||''); }
    else if (m.role === 'assistant') { appendMsg('assistant', m.content||''); }
    else if (m.role === 'status') {
      if (m.content && m.content.startsWith('__TEXT__:')) {
        appendMsg('assistant', m.content.slice(9));
      } else if (m.content) {
        appendStatus(m.content);
      }
    } else if (m.role === 'plan') {
      try {
        const p = JSON.parse(m.content);
        const steps = p.steps.map((s,i) => (s.done ? '✅' : '☐') + ' ' + esc(s.text)).join('<br>');
        const el = document.getElementById('messages');
        const d = document.createElement('div'); d.className = 'msg msg-status';
        d.innerHTML = '<div class="msg-bubble" style="color:#2c1f14;font-size:12px;padding:2px 14px">📋 ' + esc(p.title) + '<br>' + steps + '</div>';
        el.appendChild(d); el.scrollTop = el.scrollHeight;
      } catch(e) {}
    }
  }
  // 切回对话页
  switchPage('chat', document.querySelector('.nav-item'));
  setMood('默认');
  // 加载规则
  const hasRules = await pywebview.api.rules_exist();
  if (hasRules) {
    document.getElementById('ruleCreate').style.display = 'none';
    document.getElementById('ruleEditor').style.display = 'block';
    document.getElementById('rulesInput').value = await pywebview.api.get_rules();
  } else {
    document.getElementById('ruleCreate').style.display = 'block';
    document.getElementById('ruleEditor').style.display = 'none';
  }
}
async function newSession() {
  if (processing) return;
  await pywebview.api.new_conv();
  document.getElementById('messages').innerHTML = '';
  document.getElementById('convTitle').textContent = '新对话';
  await loadConvs();
  switchPage('chat', document.querySelector('.nav-item'));
}
async function deleteConv(id) {
  if (processing) return;
  if (!confirm('确定删除该对话？')) return;
  await pywebview.api.delete_conv(id);
  await loadConvs();
  if (convs.length > 0) {
    await switchConv(convs[0].id);
  } else {
    document.getElementById('messages').innerHTML = '';
    switchPage('chat', document.querySelector('.nav-item'));
  }
}

// ---- 设置 ----
async function loadSettings() {
  loadChars();
  document.getElementById('modelSelect').value = await pywebview.api.get_model();
  document.getElementById('apiKeyInput').value = await pywebview.api.get_apikey();
  // 加载头像
  const avatarData = await pywebview.api.get_avatar_data();
  if (avatarData) {
    updateLargePreview(avatarData);
    document.getElementById('avatarPathDisplay').value = '已自定义头像';
  } else {
    updateLargePreview('');
    document.getElementById('avatarPathDisplay').value = '';
  }
}
function switchSettingTab(btn, id) {
  document.querySelectorAll('.settings-tab').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.settings-content').forEach(e=>e.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
}

async function createRules() {
  await pywebview.api.create_rules();
  document.getElementById('ruleCreate').style.display = 'none';
  document.getElementById('ruleEditor').style.display = 'block';
  document.getElementById('rulesInput').value = await pywebview.api.get_rules();
}
async function saveRules() {
  const text = document.getElementById('rulesInput').value.trim();
  await pywebview.api.save_rules(text);
  alert('规则已保存，重启对话后生效。');
}
async function saveModel() {
  const model = document.getElementById('modelSelect').value;
  const apikey = document.getElementById('apiKeyInput').value.trim();
  if (model) await pywebview.api.set_model(model);
  if (apikey && !apikey.includes('••••')) await pywebview.api.save_apikey(apikey);
  alert('模型设定已保存。');
}
async function onAvatarFile(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    const dataUrl = e.target.result;
    await pywebview.api.save_avatar_data(dataUrl);
    updateLargePreview(dataUrl);
    document.getElementById('avatarPathDisplay').value = file.name;
    updatePetAvatar(dataUrl);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}
async function clearAvatar() {
  await pywebview.api.clear_avatar();
  updateLargePreview('');
  document.getElementById('avatarPathDisplay').value = '';
  updatePetAvatar('');
}
function updateLargePreview(src) {
  const el = document.getElementById('avatarLargePreview');
  if (src) {
    el.innerHTML = '<img src="'+esc(src)+'" style="max-width:100%;max-height:100%;object-fit:contain">';
  } else {
    el.innerHTML = `<svg width="120" height="120" viewBox="0 0 120 120">
      <circle cx="60" cy="55" r="36" fill="#FFB347"/>
      <polygon points="32,40 22,15 42,30" fill="#FF9F43"/>
      <polygon points="88,40 98,15 78,30" fill="#FF9F43"/>
      <ellipse cx="48" cy="50" rx="6" ry="7" fill="#333"/>
      <ellipse cx="72" cy="50" rx="6" ry="7" fill="#333"/>
      <polygon points="57,65 63,65 60,70" fill="#FF6B6B"/>
      <path d="M52,71 Q58,76 60,71 Q62,76 68,71" fill="none" stroke="#555" stroke-width="2"/>
    </svg>`;
  }
}
function updateAvatarPreview(src) {
  const el = document.getElementById('avatarPreview');
  if (src) {
    el.innerHTML = '<img src="'+esc(src)+'" style="width:100%;height:100%;object-fit:cover">';
  } else { showDefaultAvatar(); }
}
function showDefaultAvatar() {
  document.getElementById('avatarPreview').innerHTML =
    `<svg width="80" height="80" viewBox="0 0 80 80">
      <circle cx="40" cy="38" r="24" fill="#FFB347"/>
      <polygon points="20,30 14,12 30,22" fill="#FF9F43"/>
      <polygon points="60,30 66,12 50,22" fill="#FF9F43"/>
      <ellipse cx="32" cy="34" rx="4" ry="5" fill="#333"/>
      <ellipse cx="48" cy="34" rx="4" ry="5" fill="#333"/>
      <polygon points="38,42 42,42 40,46" fill="#FF6B6B"/>
      <path d="M34,46 Q38,50 40,46 Q42,50 46,46" fill="none" stroke="#555" stroke-width="1.5"/>
    </svg>`;
}

// ---- MCP ----
async function loadMcpStatus() {
  const data = JSON.parse(await pywebview.api.get_mcp_status());
  const el = document.getElementById('mcpList'); el.innerHTML = '';
  for (const s of data) {
    const dot = s.status === 'connected' ? 'ok' : 'err';
    const actions = s.status === 'connected'
      ? '<button class="btn btn-secondary" onclick="removeMcp(\''+s.name+'\')">断开</button>'
      : '<button class="btn btn-primary" onclick="reconnectMcp(\''+s.name+'\')">重连</button><button class="btn btn-secondary" onclick="removeMcp(\''+s.name+'\')" style="margin-left:4px">删除</button>';
    const tools = s.tools.map(t => '<span class="mcp-tool-tag">'+esc(t)+'</span>').join('');
    const cmd = s.command + ' ' + (s.args||[]).join(' ');
    const errRow = s.error ? '<div style="font-size:12px;color:#e8783a;margin-bottom:6px">'+esc(s.error)+'</div>' : '';
    el.innerHTML += '<div class="mcp-card">' +
      '<div class="mcp-card-head">' +
        '<div class="mcp-status-dot '+dot+'"></div>' +
        '<span class="mcp-card-name">'+esc(s.name)+'</span>' +
        '<span style="font-size:11px;color:#a08c78">'+s.tools.length+' 个工具</span>' +
        '<div class="mcp-card-actions">'+actions+'</div>' +
      '</div>' +
      '<div class="mcp-card-cmd">'+esc(cmd)+'</div>' +
      errRow +
      '<div class="mcp-card-tools">'+tools+'</div>' +
    '</div>';
  }
}
async function removeMcp(name) {
  if (!confirm('断开并删除 "'+name+'" ？')) return;
  await pywebview.api.remove_mcp_server(name);
  loadMcpStatus();
}
async function reconnectMcp(name) {
  const ok = await pywebview.api.reconnect_mcp_server(name);
  loadMcpStatus();
}
function showAddMcp() {
  document.getElementById('mcpAddForm').style.display = 'block';
  document.getElementById('mcpAddName').value = '';
  document.getElementById('mcpAddCmd').value = '';
}
function cancelAddMcp() {
  document.getElementById('mcpAddForm').style.display = 'none';
}
async function doAddMcp() {
  const name = document.getElementById('mcpAddName').value.trim();
  const cmd = document.getElementById('mcpAddCmd').value.trim();
  const args = document.getElementById('mcpAddArgs').value.trim();
  if (!name || !cmd) { alert('名称和命令不能为空'); return; }
  await pywebview.api.add_mcp_server(name, cmd, args);
  document.getElementById('mcpAddForm').style.display = 'none';
  loadMcpStatus();
}

// ---- 技能 ----
async function loadSkills() {
  const data = JSON.parse(await pywebview.api.get_skills());
  const grid = document.getElementById('skillGrid'); grid.innerHTML = '';
  for (const s of data) {
    const statusText = s.enabled ? '已启用' : '已禁用';
    const checked = s.enabled ? 'checked' : '';
    grid.innerHTML += '' +
      '<div class="skill-card" onclick="showSkillDetail(\''+s.name+'\', event)" style="position:relative">' +
        '<span class="skill-card-del" onclick="event.stopPropagation();deleteSkill(\''+s.name+'\')">&times;</span>' +
        '<div class="skill-card-name">'+esc(s.name)+'</div>' +
        '<div class="skill-card-desc">'+esc(s.description || '暂无描述')+'</div>' +
        '<div class="skill-card-footer">' +
          '<span class="skill-card-status">'+statusText+'</span>' +
          '<label class="switch" onclick="event.stopPropagation()">' +
            '<input type="checkbox" '+checked+' onchange="toggleSkill(\''+s.name+'\',this.checked)">' +
            '<span class="slider"></span>' +
          '</label>' +
        '</div>' +
      '</div>';
  }
  grid.innerHTML += '' +
    '<div class="skill-card skill-card-add" onclick="showCreateSkill()">' +
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:6px;color:#c0b0a0">' +
        '<span style="font-size:28px;line-height:1">+</span>' +
        '<span style="font-size:13px">新建技能</span>' +
      '</div>' +
    '</div>';
}
let _skillModalName = '';
async function toggleSkill(name, enabled) {
  await pywebview.api.toggle_skill(name, enabled);
  document.querySelectorAll('.skill-card').forEach(card => {
    if (card.querySelector('.skill-card-name')?.textContent === name) {
      card.querySelector('.skill-card-status').textContent = enabled ? '已启用' : '已禁用';
    }
  });
}
async function showSkillDetail(name, event) {
  if (event && (event.target.closest('.switch') || event.target.closest('input') || event.target.closest('.skill-card-del') || event.target.closest('.skill-card-add'))) return;
  _skillModalName = name;
  document.getElementById('skillEditBtn').textContent = '编辑';
  document.getElementById('skillModalBody').style.display = 'block';
  document.getElementById('skillModalEditor').style.display = 'none';
  document.getElementById('skillModalSaveRow').style.display = 'none';
  const detail = await pywebview.api.get_skill_detail(name);
  document.getElementById('skillModalTitle').textContent = name;
  document.getElementById('skillModalBody').textContent = detail || '（无详细指引）';
  document.getElementById('skillModalEditor').value = detail || '';
  document.getElementById('skillModal').classList.add('show');
}
function hideSkillDetail(event) {
  if (event && event.target !== document.getElementById('skillModal')) return;
  document.getElementById('skillModal').classList.remove('show');
}
function toggleSkillEdit() {
  const body = document.getElementById('skillModalBody');
  const editor = document.getElementById('skillModalEditor');
  const saveRow = document.getElementById('skillModalSaveRow');
  const btn = document.getElementById('skillEditBtn');
  if (body.style.display === 'none') {
    body.style.display = 'block';
    editor.style.display = 'none';
    saveRow.style.display = 'none';
    btn.textContent = '编辑';
  } else {
    body.style.display = 'none';
    editor.style.display = 'block';
    saveRow.style.display = 'block';
    btn.textContent = '取消';
  }
}
async function saveSkillEdit() {
  const content = document.getElementById('skillModalEditor').value;
  await pywebview.api.save_skill(_skillModalName, content);
  document.getElementById('skillModalBody').textContent = content;
  toggleSkillEdit();
  loadSkills();
}
async function deleteSkill(name) {
  if (!confirm('确定删除技能 "'+name+'" ？')) return;
  await pywebview.api.delete_skill(name);
  loadSkills();
}
function showCreateSkill() {
  const name = prompt('技能名称：');
  if (!name || !name.trim()) return;
  const desc = prompt('简短描述（可选）：');
  doCreateSkill(name.trim(), (desc || '').trim());
}
async function doCreateSkill(name, desc) {
  await pywebview.api.create_skill(name, desc);
  loadSkills();
}
// ---- 角色包 ----
let _charModalName = '';
async function loadChars() {
  const data = JSON.parse(await pywebview.api.get_characters());
  const active = await pywebview.api.get_active_character();
  const grid = document.getElementById('charGrid'); grid.innerHTML = '';
  for (const c of data) {
    const isActive = c.name === active;
    const imgHtml = c.preview ? '<img class="char-card-img" src="'+c.preview+'">' : '<div class="char-card-img" style="display:flex;align-items:center;justify-content:center;color:#c0b0a0;font-size:28px">?</div>';
    grid.innerHTML += '' +
      '<div class="skill-card" onclick="showCharDetail(\''+c.name+'\')" style="position:relative">' +
        (isActive ? '<span class="char-card-active">★</span>' : '') +
        '<span class="skill-card-del" onclick="event.stopPropagation();deleteChar(\''+c.name+'\')">&times;</span>' +
        imgHtml +
        '<div class="skill-card-name">'+esc(c.name)+'</div>' +
        (isActive ? '<div style="font-size:11px;color:#e8783a">当前展示</div>' : '') +
      '</div>';
  }
  grid.innerHTML += '' +
    '<div class="skill-card skill-card-add" onclick="showCreateChar()">' +
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:6px;color:#c0b0a0">' +
        '<span style="font-size:28px;line-height:1">+</span>' +
        '<span style="font-size:13px">新建角色包</span>' +
      '</div>' +
    '</div>';
}
async function showCharDetail(name) {
  _charModalName = name;
  document.getElementById('charModalTitle').textContent = name;
  document.getElementById('charSetActiveBtn').style.display = 'inline-block';
  document.getElementById('charModal').classList.add('show');
  const moods = JSON.parse(await pywebview.api.get_character_moods(name));
  const grid = document.getElementById('charMoodGrid'); grid.innerHTML = '';
  for (const m of moods) {
    const hasImg = !!m.dataUrl;
    const img = hasImg ? '<img src="'+m.dataUrl+'" style="cursor:pointer" onclick="previewMood(\''+m.dataUrl+'\')">' : '';
    const btnText = hasImg ? '替换' : '上传';
    grid.innerHTML += '' +
      '<div class="char-mood-box" style="position:relative">' +
        '<span class="skill-card-del" onclick="event.stopPropagation();deleteCharMood(\''+name+'\',\''+m.mood+'\')">&times;</span>' +
        img +
        '<div class="mood-label" style="cursor:pointer" onclick="event.stopPropagation();renameCharMood(\''+name+'\',\''+m.mood+'\')" title="点击重命名">'+esc(m.mood)+'</div>' +
        '<input type="file" accept="image/*" hidden onchange="uploadMood(this,\''+name+'\',\''+m.mood+'\')" id="moodFile_'+m.mood+'">' +
        '<span class="char-mood-upload" onclick="document.getElementById(\'moodFile_'+m.mood+'\').click()">'+btnText+'</span>' +
      '</div>';
  }
  grid.innerHTML += '' +
    '<div class="char-mood-box" style="display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2px dashed #d0c0a8" onclick="addCharMood(\''+name+'\')">' +
      '<span style="font-size:28px;color:#c0b0a0;line-height:1">+</span>' +
      '<span style="font-size:11px;color:#a08c78;margin-top:4px">添加情绪</span>' +
    '</div>';
  const soul = await pywebview.api.get_character_soul(name);
  document.getElementById('charSoulInput').value = soul;
}
function hideCharDetail(event) {
  if (event && event.target !== document.getElementById('charModal')) return;
  document.getElementById('charModal').classList.remove('show');
}
async function uploadMood(input, name, mood) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    await pywebview.api.save_character_mood(name, mood, e.target.result);
    showCharDetail(name);
    if (mood === '默认') loadChars();
  };
  reader.readAsDataURL(file);
  input.value = '';
}
async function setActiveChar(name) {
  await pywebview.api.set_active_character(name);
  document.getElementById('charModal').classList.remove('show');
  loadChars();
  setMood('默认');
  if (document.getElementById('pageChat').classList.contains('active')) {
    setMood('默认');
  }
}
document.getElementById('charSetActiveBtn').onclick = function() {
  setActiveChar(_charModalName);
};
async function saveCharSoul() {
  const text = document.getElementById('charSoulInput').value;
  await pywebview.api.save_character_soul(_charModalName, text);
  alert('灵魂设定已保存');
}
function showCreateChar() {
  const name = prompt('角色包名称：');
  if (!name || !name.trim()) return;
  doCreateChar(name.trim());
}
async function doCreateChar(name) {
  await pywebview.api.create_character(name);
  loadChars();
}
async function deleteChar(name) {
  if (!confirm('确定删除角色包 "'+name+'" ？')) return;
  await pywebview.api.delete_character(name);
  loadChars();
}
async function renameChar(name) {
  const newName = prompt('输入新名称：', name);
  if (!newName || !newName.trim() || newName.trim() === name) return;
  await pywebview.api.rename_character(name, newName.trim());
  _charModalName = newName.trim();
  document.getElementById('charModalTitle').textContent = _charModalName + ' ✎';
  loadChars();
}
async function addCharMood(name) {
  const moodName = prompt('情绪名称（如：惊讶、害羞）：');
  if (!moodName || !moodName.trim()) return;
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.onchange = async function(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function(ev) {
      await pywebview.api.save_character_mood(name, moodName.trim(), ev.target.result);
      showCharDetail(name);
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}
async function deleteCharMood(name, mood) {
  if (!confirm('确定删除情绪 "'+mood+'" ？')) return;
  await pywebview.api.delete_character_mood(name, mood);
  showCharDetail(name);
}
async function renameCharMood(name, oldMood) {
  const newMood = prompt('新情绪名称：', oldMood);
  if (!newMood || !newMood.trim() || newMood.trim() === oldMood) return;
  await pywebview.api.rename_character_mood(name, oldMood, newMood.trim());
  showCharDetail(name);
  loadChars();
}
function previewMood(url) {
  if (!url) return;
  const modal = document.getElementById('charModal');
  const box = modal.querySelector('.modal-box');
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:2000;display:flex;align-items:center;justify-content:center;cursor:pointer';
  overlay.onclick = () => overlay.remove();
  const img = document.createElement('img');
  img.src = url;
  img.style.cssText = 'max-width:90vw;max-height:90vh;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,0.3)';
  overlay.appendChild(img);
  document.body.appendChild(overlay);
}

window.addEventListener('pywebviewready', async () => {
  await loadConvs();
  if (convs.length > 0) await switchConv(convs[0].id);
  // 工作目录
  // 工作目录
  const wd = await pywebview.api.get_workdir();
  document.getElementById('workdirBtn').textContent = '📁 ' + wd.split('\\').pop();
  document.getElementById('workdirBtn').title = wd;
  // 宠物面板大小
  const ps = await pywebview.api.get_pet_size();
  document.getElementById('petPanel').style.width = ps + 'px';
  document.getElementById('petSizeInput').value = ps;
  setMood('默认');
  loadMode();
});
</script>
